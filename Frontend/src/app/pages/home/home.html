<section class="card">
  <h1>Restaurant Booking Platform</h1>
  <p class="muted">
    Restaurant search, table reservations, and restaurant account management in one app.
  </p>

  <div class="row">
    <a class="btn btn-primary" routerLink="/restaurants">Search Restaurant</a>

    <ng-container *ngIf="auth.currentUser$ | async as user; else guestButtons">
      <a
        *ngIf="user.role === 'client'"
        class="btn btn-outline"
        routerLink="/my-reservations"
      >
        My reservations
      </a>

      <a
        *ngIf="user.role === 'restaurant'"
        class="btn btn-outline"
        routerLink="/restaurant-dashboard"
      >
        Dashboard
      </a>
    </ng-container>

    <ng-template #guestButtons>
      <a class="btn btn-outline" routerLink="/register">Create account</a>
    </ng-template>
  </div>
</section>
